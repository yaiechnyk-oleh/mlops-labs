name: Model CI (Train, Test, Report)

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (flake8 — critical errors only)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Pre-train tests (data validation)
        run: |
          pytest tests/test_data.py -v

      - name: Train model
        run: |
          python src/train.py data/prepared data/models

      - name: Post-train tests (Quality Gate)
        env:
          MODELS_DIR: "data/models"
          F1_THRESHOLD: "0.35"
        run: |
          pytest tests/test_model.py -v

      - name: Setup CML
        if: github.event_name == 'pull_request'
        uses: iterative/setup-cml@v2

      - name: Create CML report (PR only)
        if: github.event_name == 'pull_request'
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Model Metrics" > report.md
          echo '```json' >> report.md
          cat data/models/metrics.json >> report.md
          echo '```' >> report.md
          echo "" >> report.md
          echo "## Confusion Matrix" >> report.md
          cml publish data/models/confusion_matrix.png --md >> report.md
          echo "" >> report.md
          echo "### Quality Gate" >> report.md
          echo "- F1 threshold: \`0.35\`" >> report.md
          echo "- Status: ✅ PASSED" >> report.md
          cml comment create report.md

      - name: Upload model artifact (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: |
            data/models/model.pkl
            data/models/metrics.json
            data/models/confusion_matrix.png
