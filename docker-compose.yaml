# Docker Compose for Apache Airflow (Lab 5)
# Uses LocalExecutor + SQLite — no extra services needed.
# Run: docker compose up -d
# UI:  http://localhost:8080  (admin / admin)

version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: mlops-airflow:2.8.1
  environment:
    AIRFLOW__CORE__EXECUTOR: SequentialExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow-data/airflow.db
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: "mlops-lab5-secret"
    # Path inside container where the project lives
    MLOPS_PROJECT_DIR: /opt/airflow/project
    MLFLOW_TRACKING_URI: "file:///opt/airflow/project/mlruns_airflow"
    MLFLOW_EXPERIMENT_NAME: "Airflow_Pipeline"
    GIT_PYTHON_REFRESH: "quiet"
  volumes:
    - ./dags:/opt/airflow/dags          # DAG files
    - ./logs:/opt/airflow/logs          # Airflow task logs
    - .:/opt/airflow/project            # Full project mount (for bash operators)
    - ./airflow-data:/opt/airflow-data  # Persistent SQLite DB
  user: "50000:0"

services:
  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
